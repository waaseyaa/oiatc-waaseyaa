<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #141c28;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: #dce8f4;
      position: relative;
    }

    /* Dot grid */
    .grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,247,234,0.13) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 0;
    }

    /* Ambient glow — top right */
    .glow-tr {
      position: absolute;
      top: -160px;
      right: -120px;
      width: 560px;
      height: 560px;
      background: radial-gradient(circle, rgba(56, 144, 184, 0.18) 0%, transparent 70%);
      z-index: 0;
    }

    /* Ambient glow — bottom left */
    .glow-bl {
      position: absolute;
      bottom: -140px;
      left: -80px;
      width: 440px;
      height: 440px;
      background: radial-gradient(circle, rgba(232, 160, 32, 0.13) 0%, transparent 70%);
      z-index: 0;
    }

    /* Left accent bar */
    .accent-bar {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      background: linear-gradient(180deg, #e8a020 0%, #3890b8 60%, transparent 100%);
      z-index: 1;
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      padding: 56px 80px 52px 84px;
    }

    /* Top section */
    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .brand-mark {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #e8a020;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(130, 152, 184, 0.9);
      border: 1px solid rgba(56, 144, 184, 0.3);
      padding: 6px 14px;
      border-radius: 4px;
    }

    /* Middle: headline */
    .headline {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px 0 28px;
    }

    .headline h1 {
      font-size: 62px;
      font-weight: 700;
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: #dce8f4;
      margin-bottom: 20px;
      max-width: 820px;
    }

    .headline h1 em {
      font-style: normal;
      color: #e8a020;
    }

    .subline {
      font-size: 20px;
      font-weight: 400;
      color: rgba(220, 232, 244, 0.62);
      letter-spacing: -0.01em;
      max-width: 680px;
      line-height: 1.4;
    }

    /* Bottom: meta row */
    .meta {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .pill {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(220, 232, 244, 0.55);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(180, 204, 240, 0.12);
      padding: 5px 12px;
      border-radius: 4px;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(56, 144, 184, 0.5);
    }

    /* Decorative circle — far right */
    .deco-ring {
      position: absolute;
      right: 60px;
      top: 50%;
      transform: translateY(-50%);
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 1px solid rgba(232, 160, 32, 0.15);
      z-index: 1;
    }

    .deco-ring::before {
      content: "";
      position: absolute;
      inset: 22px;
      border-radius: 50%;
      border: 1px solid rgba(56, 144, 184, 0.1);
    }

    .deco-ring::after {
      content: "";
      position: absolute;
      inset: 44px;
      border-radius: 50%;
      background: rgba(56, 144, 184, 0.05);
    }

    /* URL watermark */
    .url {
      position: absolute;
      bottom: 52px;
      right: 80px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: rgba(130, 152, 184, 0.5);
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow-tr"></div>
  <div class="glow-bl"></div>
  <div class="accent-bar"></div>
  <div class="deco-ring"></div>

  <div class="content">
    <div class="top">
      <div class="brand-mark">OIATC</div>
      <div class="eyebrow">Ontario Indigenous AI &amp; Technology Council</div>
    </div>

    <div class="headline">
      <h1>Indigenous <em>digital sovereignty</em><br>in Ontario.</h1>
      <p class="subline">Governance, platform stewardship, training, and research rooted in Indigenous law, protocol, and continuity.</p>
    </div>

    <div class="meta">
      <span class="pill">Governance</span>
      <div class="dot"></div>
      <span class="pill">Platform stewardship</span>
      <div class="dot"></div>
      <span class="pill">Training &amp; research</span>
    </div>
  </div>

  <div class="url">oiatc.waaseyaa.org</div>
</body>
</html>
