<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Per-post OG card for /news. Rendered by scripts/generate-og.js, one per
       published news post, from the app:news-og-manifest list. Placeholders
       below are substituted by the generator. */
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #141c28;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: #dce8f4;
      position: relative;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,247,234,0.10) 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: 0;
    }

    .glow-tr {
      position: absolute;
      top: -180px;
      right: -120px;
      width: 580px;
      height: 580px;
      background: radial-gradient(circle, rgba(56, 144, 184, 0.18) 0%, transparent 70%);
      z-index: 0;
    }

    .glow-bl {
      position: absolute;
      bottom: -160px;
      left: -100px;
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(232, 160, 32, 0.13) 0%, transparent 70%);
      z-index: 0;
    }

    .accent-bar {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      background: linear-gradient(180deg, #e8a020 0%, #3890b8 60%, transparent 100%);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      padding: 56px 80px 52px 84px;
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .brand-mark {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #e8a020;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(130, 152, 184, 0.9);
      border: 1px solid rgba(56, 144, 184, 0.3);
      padding: 6px 14px;
      border-radius: 4px;
    }

    .headline {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 28px 0 24px;
    }

    .headline h1 {
      font-size: 52px;
      font-weight: 700;
      line-height: 1.06;
      letter-spacing: -0.022em;
      color: #ffffff;
      margin-bottom: 22px;
      max-width: 980px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .subline {
      font-size: 20px;
      font-weight: 400;
      color: rgba(220, 232, 244, 0.66);
      letter-spacing: -0.01em;
      max-width: 880px;
      line-height: 1.42;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .url {
      position: absolute;
      bottom: 52px;
      right: 80px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: rgba(130, 152, 184, 0.55);
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow-tr"></div>
  <div class="glow-bl"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="top">
      <div class="brand-mark">OIATC</div>
      <div class="eyebrow">OIATC News</div>
    </div>

    <div class="headline">
      <h1>{{TITLE}}</h1>
      <p class="subline">{{DESCRIPTION}}</p>
    </div>
  </div>

  <div class="url">{{URL}}</div>
</body>
</html>
