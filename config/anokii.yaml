# Anokii distribution configuration for OIATC.
# SPDX-License-Identifier: GPL-2.0-or-later
#
# OIATC runs on the Anokii distribution (waaseyaa/anokii) in the SHARED-GRAPH
# tier: one public install serving many communities as vantage views over a
# shared PUBLIC graph (Community, Place, Org, Service, Project, Topic). Only
# public-sourced data lives in the shared layer; there is no member data and no
# member login. Loaded by Anokii\Config\DistributionConfig
# (src/Config/DistributionConfig.php), bound in AppServiceProvider.

# The tier switch. OIATC is the canonical shared-graph install.
tenancy_mode: shared-graph

# Data-residency posture, stated explicitly. Shared-graph holds only
# public-sourced data; cross-tenant reads are permitted but the framework
# FieldAccessPolicyInterface still keeps anything above the public tier
# Forbidden across tenants.
data_residency:
  ownership: shared
  default_classification: public
  cross_tenant_reads: true

# Module surface gate. The public Co-Intelligence chat was retired (moved to
# rhtcircle); OIATC's remaining public surface is Resources. The sovereign-
# workspace surfaces are not part of this install (preview, not production).
modules:
  enabled:
    - resources
  preview:
    - governed-drive
    - forms
    - tasks
    - data-rooms
    - docs
    - sheets
    - admin-centre

# Co-Intelligence chat. Consumed by the package CoIntelligenceServiceProvider,
# which mounts POST /api/chat. OIATC keeps its two vantages (Sagamok default,
# Massey selectable) and the exact intro + refusal strings the retired
# App\Support\ChatPromptBuilder carried, so the cited answers and the byte-exact
# refusals are unchanged. Rate limit (12/60s) and model (claude-sonnet-4-6) are
# package defaults; web research stays off (no ANOKII_WEB_RESEARCH).
chat:
  default_vantage: sagamok
  vantages:
    - sagamok
    - massey
  voice:
    intro: "You are the Anokii community assistant on the OIATC site. OIATC (the Ontario Indigenous AI & Technology Council) publishes plain-language, public community resources."
    refusal: "I don't know from the OIATC site. For this, contact the band directly, and use the official Sagamok directory at sagamokanishnawbek.com."
    community_refusals:
      massey: "I don't know that from the Anokii content for Massey yet, which is limited right now. For the Massey Solar Project, see the RHT Members' Transparency Circle at https://rhtcircle.ca/land/massey-solar-project. For other matters, contact your community office directly."
